name: Bug report
description: Report a reproducible problem without including private server data.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not include passwords, private keys, complete logs, public host addresses, or local databases. Report security vulnerabilities privately through the Security tab.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.5.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use sanitized example hosts and paths.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
